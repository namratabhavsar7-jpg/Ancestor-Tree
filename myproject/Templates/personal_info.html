{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="form-section">
    <div class="container">
        <div class="section-heading">
            <h1>Personal Information</h1>
        </div>

        {% if success %}
        <div class="success-message">
            Personal details submitted successfully 🎉
        </div>
        {% endif %}

        <form method="POST" id="personalInfoForm" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-card">
                <div class="form-title">Basic Details</div>
                <div class="form-grid">
                    <div class="full-name-group">
                        <div class="name-fields">
                            <input type="text" name="first_name" placeholder="First Name" required>
                            <input type="text" name="middle_name" placeholder="Middle Name">
                            <input type="text" name="last_name" placeholder="Last Name" required>
                        </div>
                    </div>
                    
                    <div class="gender-container" style="position: relative;">
                        <input type="text" id="genderDisplay" readonly placeholder="Select Gender" required style="background: #fafafa; cursor: pointer;">
                        <select name="gender" id="genderSelect" onchange="handleGenderChange()" required style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <input type="text" name="other_gender" id="other_gender_input" style="display:none;" placeholder="Please specify gender">

                    <select name="religion" required>
                        <option value="Hindu">Hindu</option>
                    </select>

                    <select name="nationality" required>
                        <option value="Indian">Indian</option>
                    </select>
                    
                    <input type="number" step="0.01" name="height" placeholder="Height (cm)">
                    <input type="number" step="0.01" name="weight" placeholder="Weight (kg)">
                    
                    <div>
                        <input type="file" name="photo" style="padding: 11px 18px;">
                    </div>
                </div>
            </div>

            <div class="submit-area">
                <button type="submit" class="submit-btn">Submit </button>
            </div>
        </form>
    </div>
</section>

<script>
    function handleGenderChange() {
        const genderSelect = document.getElementById('genderSelect');
        const genderDisplay = document.getElementById('genderDisplay');
        const otherGenderInput = document.getElementById('other_gender_input');
        
        genderDisplay.value = genderSelect.value;
        
        if (genderSelect.value === 'Other') {
            otherGenderInput.style.display = 'block';
            otherGenderInput.required = true;
        } else {
            otherGenderInput.style.display = 'none';
            otherGenderInput.required = false;
        }
    }
</script>
{% endblock %}
