{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="form-section">
    <div class="container">
        <div class="section-heading">
            <h1>Kuldevi & Kuldev Details</h1>
            <p>Please provide your Goatra and Deity information.</p>
        </div>

        {% if success %}
        <div class="success-message">
            Details submitted successfully 🎉
        </div>
        {% endif %}

        <form method="POST" id="kuldeviDetailsForm">
            {% csrf_token %}

            <!-- Goatra Section -->
            <div class="form-card">
                <div class="form-title">Identity</div>
                <div class="form-grid">
                    <input type="text" name="goatra" placeholder="Enter Goatra" required>
                </div>
            </div>

            <!-- Deity Details Section -->
            <div class="form-card">
                <div class="form-title">Deity Details</div>
                <div id="deity-container">
                    <!-- Initial Entry -->
                    <div class="deity-entry" id="deity-1">
                        <div class="form-grid" style="grid-template-columns: 1fr 2fr auto; align-items: center; gap: 15px;">
                            <select name="dev_type" required>
                                <option value="Kuldevi">Kuldevi</option>
                                <option value="Kuldev">Kuldev</option>
                            </select>
                            <input type="text" name="dev_name" placeholder="Name of Deity" required>
                            <div style="width: 40px;"></div> <!-- Placeholder for align -->
                        </div>
                    </div>
                </div>

                <div style="margin-top: 20px; text-align: left;">
                    <button type="button" class="add-more-btn" onclick="addMoreDeity()">+ Add More Deity</button>
                </div>
            </div>

            <div class="submit-area">
                <button type="submit" class="submit-btn">Complete & Save Profile</button>
            </div>
        </form>
    </div>
</section>

<script>
let deityCount = 1;

function addMoreDeity() {
    deityCount++;
    const container = document.getElementById('deity-container');
    const newEntry = document.createElement('div');
    newEntry.className = 'deity-entry';
    newEntry.id = `deity-${deityCount}`;
    newEntry.style.marginTop = '15px';
    newEntry.innerHTML = `
        <div class="form-grid" style="grid-template-columns: 1fr 2fr auto; align-items: center; gap: 15px;">
            <select name="dev_type" required>
                <option value="Kuldevi">Kuldevi</option>
                <option value="Kuldev">Kuldev</option>
            </select>
            <input type="text" name="dev_name" placeholder="Name of Deity" required>
            <button type="button" onclick="removeDeity(${deityCount})" style="background: #ffebee; color: #e53935; border: 1px solid #ffcdd2; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600;">✕</button>
        </div>
    `;
    container.appendChild(newEntry);
}

function removeDeity(id) {
    const entry = document.getElementById(`deity-${id}`);
    if (entry) {
        entry.style.opacity = '0';
        entry.style.transform = 'translateY(-10px)';
        setTimeout(() => entry.remove(), 300);
    }
}
</script>

<style>
.deity-entry {
    transition: all 0.3s ease;
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.add-more-btn {
    background: #edf5ea;
    color: #4f7942;
    padding: 12px 24px;
    border: 1px dashed #4f7942;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.add-more-btn:hover {
    background: #4f7942;
    color: white;
}
</style>
{% endblock %}
