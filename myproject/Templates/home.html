{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Ancestor Tree</title>

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<header class="header">

    <div class="container navbar">

        <div class="logo">

            Ancestor<span>Tree</span>

        </div>

            <a href="/">Home</a>

            <a href="/form/">Form</a>

            <a href="/about/">About</a>

        </nav>

    </div>

<section class="hero">

    <div class="container hero-content">

        <div class="hero-left">

            </span>

        <div class="hero-right">

            <div class="hero-card">

                <div class="member">

                <div class="member">

                </div>

                <div class="member active">
