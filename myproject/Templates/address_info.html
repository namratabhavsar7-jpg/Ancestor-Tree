{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="form-section">
    <div class="container">
        <div class="section-heading">
            <h1>Address Details</h1>
            <p>Please provide your location and address information.</p>
        </div>

        {% if success %}
        <div class="success-message">
            Address details submitted successfully 🎉
        </div>
        {% endif %}

        <form method="POST" id="addressDetailsForm">
            {% csrf_token %}

            <div class="form-card">
                <div class="form-title">Location Details</div>
                <div class="form-grid">
                    <select name="state" id="state" required>
                        <option value="">-- Select State --</option>
                    </select>
                    
                    <select name="district" id="district" required>
                        <option value="">-- Select District --</option>
                    </select>

                    <select name="taluka" id="taluka" required>
                        <option value="">-- Select Taluka --</option>
                    </select>

                    <select name="village" id="village" required>
                        <option value="">-- Select Village / City --</option>
                    </select>

                    <input type="text" name="city" placeholder="City (Optional)">
                    <input type="text" name="area" placeholder="Area / Street">
                    <input type="text" name="pincode" id="pincode" placeholder="Pincode" readonly>
                    <input type="text" name="native" placeholder="Native Place">
                </div>
            </div>

            <div class="submit-area">
                <button type="submit" class="submit-btn">Submit Address Details</button>
            </div>
        </form>
    </div>
</section>

<script src="{% static 'js/address_logic.js' %}"></script>
{% endblock %}
