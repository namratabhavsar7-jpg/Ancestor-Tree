{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="form-section">
    <div class="container">
        <div class="section-heading">
            <h1>Contact Information</h1>
            <p>Please provide your contact details below.</p>
        </div>

        {% if success %}
        <div class="success-message">
            Contact details submitted successfully 🎉
        </div>
        {% endif %}

        <form method="POST" id="contactInfoForm">
            {% csrf_token %}

            <div class="form-card">
                <div class="form-title">Contact Details</div>
                <div class="form-grid">
                    <div>
                        <label>Mobile Number</label>
                        <div class="phone-group">
                            <select name="country_code" class="country-select">
                                <option value="+91">🇮🇳 +91</option>
                            </select>
                            <input type="text" id="contact_number_1" name="contact_number_1" placeholder="Mobile Number" 
                                pattern="\d{10}" maxlength="10" minlength="10" required 
                                oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                        </div>
                    </div>
                    
                    <div>
                        <label>Secondary Number (Optional)</label>
                        <input type="text" name="contact_number_2" placeholder="Secondary Number (Optional)" 
                            pattern="\d{10}" maxlength="10" minlength="10"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                    </div>
                    
                    <div class="whatsapp-section">
                        <label>WhatsApp Number</label>
                        <div class="same-checkbox" style="margin-bottom: 5px;">
                            <input type="checkbox" id="sameAsContact">
                            <label for="sameAsContact" style="margin: 0; color: #7b6a58; font-weight: 500; font-size: 0.8rem;">Same as Mobile</label>
                        </div>
                        <input type="text" id="whatsapp_number" name="whatsapp_number" placeholder="WhatsApp Number" 
                               pattern="\d{10}" maxlength="10" minlength="10"
                               oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                    </div>

                    <div>
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="Email Address">
                    </div>
                </div>
            </div>

            <div class="submit-area">
                <button type="submit" class="submit-btn">Submit Contact Details</button>
            </div>
        </form>
    </div>
</section>
<script src="{% static 'js/script.js' %}"></script>
{% endblock %}
