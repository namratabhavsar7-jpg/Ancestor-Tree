{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancestor Tree</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <div class="main-wrapper" id="mainWrapper">
        <!-- Click Outside Overlay -->
        <div class="sidebar-overlay" onclick="closeSidebar()"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Ancestor <span>Tree</span></h3>
            </div>
            <nav class="sidebar-nav">
                <a href="{% url 'personal_info' %}" class="nav-item" onclick="closeSidebar()">
                    <span class="icon">👤</span> Personal Information
                </a>
                <a href="{% url 'contact_info' %}" class="nav-item" onclick="closeSidebar()">
                    <span class="icon">📞</span> Contact Information
                </a>
                <a href="{% url 'address_details' %}" class="nav-item" onclick="closeSidebar()">
                    <span class="icon">📍</span> Address Details
                </a>
                <a href="{% url 'bank_details' %}" class="nav-item" onclick="closeSidebar()">
                    <span class="icon">🏦</span> Bank Details
                </a>
                <a href="{% url 'upi_details' %}" class="nav-item" onclick="closeSidebar()">
                    <span class="icon">💸</span> UPI Details
                </a>
                <a href="{% url 'nived_details' %}" class="nav-item" onclick="closeSidebar()">
                    <span class="icon">🔱</span> Nived Details
                </a>
                <a href="{% url 'kuldevi_info' %}" class="nav-item" onclick="closeSidebar()">
                    <span class="icon">🌸</span> Kuldevi Details
                </a>
            </nav>
        </aside>

        <main class="content-area">
            <header class="header">
                <div class="container navbar">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <button class="header-toggle-btn" onclick="toggleSidebar()">☰</button>
                        <div class="logo">Ancestor<span>Tree</span></div>
                    </div>
                    <nav class="nav-links">
                        <a href="/">Home</a>
                        <a href="/form/">Form</a>
                        <a href="/about/">About</a>
                    </nav>
                </div>
            </header>

            {% block content %}
            {% endblock %}
            </main>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('mainWrapper').classList.toggle('sidebar-active');
        }
        function closeSidebar() {
            document.getElementById('mainWrapper').classList.remove('sidebar-active');
        }
    </script>
</body>
</html>
