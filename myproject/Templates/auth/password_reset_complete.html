{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="min-height: 80vh; display: flex; justify-content: center; align-items: center; padding: 40px 20px; background: #f8fafc;">
    <div class="auth-card" style="max-width: 450px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center;">
        <div style="font-size: 60px; margin-bottom: 20px;">✅</div>
        <div style="font-size: 28px; font-weight: 800; color: #1a4d2e; letter-spacing: -1px; margin-bottom: 15px;">
            Password Reset
        </div>
        <p style="color: #64748b; font-size: 16px; line-height: 1.6; margin-bottom: 30px;">
            Your password has been set. You may go ahead and log in now.
        </p>
        
        <div style="margin-top: 40px; padding-top: 25px; border-top: 1px solid #f1f5f9;">
            <a href="{% url 'login' %}" class="cta-primary" style="text-decoration: none; display: inline-block; padding: 12px 30px;">Sign In Now</a>
        </div>
    </div>
</div>
{% endblock %}
