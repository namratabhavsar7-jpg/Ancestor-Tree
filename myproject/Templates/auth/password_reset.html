{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="min-height: 80vh; display: flex; justify-content: center; align-items: center; padding: 40px 20px; background: #f8fafc;">
    <div class="auth-card" style="max-width: 450px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        <div style="text-align: center; margin-bottom: 35px;">
            <div style="font-size: 32px; font-weight: 800; color: #1a4d2e; letter-spacing: -1px; margin-bottom: 8px;">
                Reset<span style="color: #4f7942;">Password</span>
            </div>
            <p style="color: #64748b; font-size: 15px;">Enter your email to receive a password reset link.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="auth-input-group">
                <label>Email Address</label>
                <input type="email" name="email" class="auth-input" placeholder="Enter your registered email" required>
            </div>
            
            <button type="submit" class="submit-btn" style="width: 100%; margin-top: 15px;">
                Send Reset Link
            </button>
        </form>

        <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #f1f5f9;">
            <p style="color: #64748b; font-size: 14px;">Remember your password? 
                <a href="{% url 'login' %}" style="color: #1a4d2e; font-weight: 700; text-decoration: none; margin-left: 5px;">Sign In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
