{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="form-section">
    <div class="container">
        <div class="section-heading">
            <h1>Fill this details and get your family tree</h1>
            <p>Enter all family details carefully.</p>
        </div>

        {% if success %}
        <div class="success-message">
            Family details submitted successfully 🎉
        </div>
        {% endif %}

        <form method="POST" id="familyForm" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-card">
                <div class="form-title">Personal Details</div>
                <div class="form-grid">
                    <div class="full-name-group">
                        <div class="name-fields">
                            <input type="text" name="first_name" placeholder="First Name" required>
                            <input type="text" name="middle_name" placeholder="Middle Name">
                            <input type="text" name="last_name" placeholder="Last Name" required>
                        </div>
                    </div>
                    <input type="text" name="religion" placeholder="Religion">
                    <input type="text" name="nationality" placeholder="Nationality">
                    <input type="text" name="goatra" placeholder="Goatra">
                    <select name="gender">
                        <option>Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                    <select name="relationship_title">
                        <option value="">Select Relationship</option>
                        <option value="Father">Father</option>
                        <option value="Mother">Mother</option>
                        </select>
                    <input type="number" name="height" placeholder="Height">
                    <input type="number" name="weight" placeholder="Weight">
                    <input type="file" name="photo">
                </div>
            </div>

            <div class="form-card">
                <div class="form-title">Contact Details</div>
                <div class="form-grid">
                    <div class="phone-group">
                        <select name="country_code" class="country-select">
                            <option value="+91">🇮🇳 +91</option>
                            <option value="+1">🇺🇸 +1</option>
                        </select>
                        <input type="tel" id="contact_number_1" name="contact_number_1" placeholder="Enter Mobile Number" maxlength="10" required>
                    </div>
                    <div class="whatsapp-section">
                        <div class="same-checkbox">
                            <input type="checkbox" id="sameAsContact">
                            <label for="sameAsContact">Same as above</label>
                        </div>
                        <div class="phone-group">
                            <input type="tel" id="whatsapp_number" name="whatsapp_number" placeholder="WhatsApp Number" maxlength="10">
                        </div>
                    </div>
                    <input type="email" name="email" placeholder="Email Address">
                    <textarea name="address" placeholder="Permanent Address"></textarea>
                </div>
            </div>

            <div class="form-card">
                <div class="form-title">Identity Details</div>
                <div class="form-grid">
                    <input type="text" name="aadhar_card_number" placeholder="Aadhar Card Number" maxlength="12">
                    <input type="text" name="pan_card_number" placeholder="PAN Card Number" maxlength="10">
                </div>
            </div>

            <div class="submit-area">
                <button type="submit" class="submit-btn">Submit Details</button>
            </div>
        </form>
    </div>
</section>

<script src="{% static 'js/script.js' %}"></script>
{% endblock %}
